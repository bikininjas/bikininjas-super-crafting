name: CI/CD — Super Crafting

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build test

  release:
    name: CD — Release
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Get the latest tag (or fall back to v0.0.0)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VER=${LATEST_TAG#v}
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # First release when no real tags exist
          if [ "$LATEST_TAG" = "v0.0.0" ] || ! git tag | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version=0.1.0" >> $GITHUB_OUTPUT
            echo "bump=initial" >> $GITHUB_OUTPUT
            exit 0
          fi

          IFS='.' read -r MAJ MIN PAT <<< "$LATEST_VER"

          # Count conventional commit types since the last tag
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s" 2>/dev/null || echo "")

          HAS_BREAKING=$(echo "$COMMITS" | grep -cE '! :|BREAKING CHANGE' || true)
          HAS_FEAT=$(echo "$COMMITS" | grep -cE '^feat' || true)
          HAS_FIX=$(echo "$COMMITS" | grep -cE '^(fix|perf|chore|docs|style|refactor|test)' || true)

          if [ "$HAS_BREAKING" -gt 0 ]; then
            MAJ=$((MAJ + 1)); MIN=0; PAT=0
            echo "bump=major" >> $GITHUB_OUTPUT
          elif [ "$HAS_FEAT" -gt 0 ]; then
            MIN=$((MIN + 1)); PAT=0
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif [ "$HAS_FIX" -gt 0 ] || [ -n "$COMMITS" ]; then
            PAT=$((PAT + 1))
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

          echo "version=${MAJ}.${MIN}.${PAT}" >> $GITHUB_OUTPUT

      - name: Build release JAR
        run: ./gradlew build -Pmod_version=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Super Crafting v${{ steps.version.outputs.version }}

            Bump: ${{ steps.version.outputs.bump }}

            Automated release from commit ${{ github.sha }}.
          files: build/libs/*.jar
          make_latest: true
          generate_release_notes: true
